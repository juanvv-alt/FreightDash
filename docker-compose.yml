version: '3.9'

services:
  # PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    container_name: freightdash_db
    environment:
      POSTGRES_DB: ${COMPOSE_DB_NAME:-freightdash}
      POSTGRES_USER: ${COMPOSE_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${COMPOSE_DB_PASSWORD:-changeme}
      # Singapore timezone
      TZ: Asia/Singapore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${COMPOSE_DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - freightdash_network
    restart: unless-stopped

  # Django Application Service
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: freightdash_web
    command: sh /app/entrypoint.sh
    environment:
      # Database Configuration
      DATABASE_ENGINE: django.db.backends.postgresql
      DATABASE_NAME: ${COMPOSE_DB_NAME:-freightdash}
      DATABASE_USER: ${COMPOSE_DB_USER:-postgres}
      DATABASE_PASSWORD: ${COMPOSE_DB_PASSWORD:-changeme}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      # Django Settings
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      # Render Region Optimization (Singapore)
      TZ: Asia/Singapore
      # CORS Settings (adjust as needed)
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:3000,http://localhost:8000}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    networks:
      - freightdash_network
    restart: unless-stopped
    # For development with auto-reload
    stdin_open: true
    tty: true

  # AIS Ingestion Worker (supply forecast)
  # Long-lived websocket consumer that maintains vessel state and emits
  # port-call events; --with-aggregation also builds the daily snapshot/signal.
  # Requires AISSTREAM_API_KEY (free key from https://aisstream.io). Do not run
  # this alongside a separate worker on the SAME key -- one connection per key.
  ais_ingester:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: freightdash_ais
    command: python manage.py ingest_ais --with-aggregation
    environment:
      DATABASE_ENGINE: django.db.backends.postgresql
      DATABASE_NAME: ${COMPOSE_DB_NAME:-freightdash}
      DATABASE_USER: ${COMPOSE_DB_USER:-postgres}
      DATABASE_PASSWORD: ${COMPOSE_DB_PASSWORD:-changeme}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      TZ: Asia/Singapore
      AISSTREAM_API_KEY: ${AISSTREAM_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - freightdash_network
    restart: unless-stopped

  # Redis Cache Service (Optional but recommended for production)
  redis:
    image: redis:7-alpine
    container_name: freightdash_redis
    environment:
      TZ: Asia/Singapore
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - freightdash_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_volume:
    driver: local

networks:
  freightdash_network:
    driver: bridge
