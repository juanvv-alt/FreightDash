services:
  - type: web
    name: freightdash-web
    env: docker
    region: singapore
    plan: standard
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health/
    
    envVars:
      - key: DEBUG
        value: "False"
      - key: ENVIRONMENT
        value: "production"
      - key: TZ
        value: "Asia/Singapore"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: freightdash
          property: connectionString
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://freightdash-web.onrender.com,https://freightdash.onrender.com"
      - key: ALLOWED_HOSTS
        value: "freightdash-web.onrender.com,freightdash.onrender.com"

  # AIS ingest and supply aggregation are now triggered manually from the
  # /supply-forecast/status/ page (buttons run 5-min ingest + daily agg
  # inside the web process — no extra Render cron cost).
  #
  # To re-enable automatic cron jobs (Render starter plan required), uncomment:
  #
  # - type: cron
  #   name: freightdash-ais-poll
  #   env: docker
  #   region: singapore
  #   plan: starter
  #   dockerfilePath: ./Dockerfile
  #   schedule: "*/20 * * * *"
  #   dockerCommand: python manage.py ingest_ais --duration-seconds 1080
  #   envVars:
  #     - key: DEBUG
  #       value: "False"
  #     - key: ENVIRONMENT
  #       value: "production"
  #     - key: TZ
  #       value: "Asia/Singapore"
  #     - key: SECRET_KEY
  #       fromService:
  #         type: web
  #         name: freightdash-web
  #         envVarKey: SECRET_KEY
  #     - key: DATABASE_URL
  #       fromDatabase:
  #         name: freightdash
  #         property: connectionString
  #     - key: AISSTREAM_API_KEY
  #       sync: false
  #
  # - type: cron
  #   name: freightdash-supply-agg
  #   env: docker
  #   region: singapore
  #   plan: starter
  #   dockerfilePath: ./Dockerfile
  #   schedule: "15 16 * * *"
  #   dockerCommand: python manage.py aggregate_supply
  #   envVars:
  #     - key: DEBUG
  #       value: "False"
  #     - key: ENVIRONMENT
  #       value: "production"
  #     - key: TZ
  #       value: "Asia/Singapore"
  #     - key: SECRET_KEY
  #       fromService:
  #         type: web
  #         name: freightdash-web
  #         envVarKey: SECRET_KEY
