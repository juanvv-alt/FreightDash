services:
  - type: web
    name: freightdash-web
    env: docker
    region: singapore
    plan: standard
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health/
    
    envVars:
      - key: DEBUG
        value: "False"
      - key: ENVIRONMENT
        value: "production"
      - key: TZ
        value: "Asia/Singapore"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: freightdash
          property: connectionString
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://freightdash-web.onrender.com,https://freightdash.onrender.com"
      - key: ALLOWED_HOSTS
        value: "freightdash-web.onrender.com,freightdash.onrender.com"

  # AIS ingestion worker for the supply forecast. Long-lived websocket consumer
  # that maintains vessel state, emits port-call events, and (via
  # --with-aggregation) builds the daily snapshot + signal just after midnight.
  # dockerCommand bypasses entrypoint.sh so the worker does not run gunicorn /
  # collectstatic / migrations -- the web service owns those. Set
  # AISSTREAM_API_KEY in the Render dashboard (free key from aisstream.io).
  - type: worker
    name: freightdash-ais
    env: docker
    region: singapore
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerCommand: python manage.py ingest_ais --with-aggregation
    envVars:
      - key: DEBUG
        value: "False"
      - key: ENVIRONMENT
        value: "production"
      - key: TZ
        value: "Asia/Singapore"
      - key: SECRET_KEY
        fromService:
          type: web
          name: freightdash-web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: freightdash
          property: connectionString
      - key: AISSTREAM_API_KEY
        sync: false

databases:
  - name: freightdash
    databaseName: freightdash
    region: singapore
    plan: standard
    postgresVersion: 15
