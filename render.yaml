services:
  - type: web
    name: freightdash-web
    env: docker
    region: singapore
    plan: standard
    dockerfilePath: ./Dockerfile
    
    envVars:
      - key: DEBUG
        value: "False"
      - key: ENVIRONMENT
        value: "production"
      - key: TZ
        value: "Asia/Singapore"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: freightdash
          property: connectionString
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://freightdash-web.onrender.com,https://freightdash.onrender.com"

databases:
  - name: freightdash
    databaseName: freightdash
    region: singapore
    plan: standard
    postgresVersion: 15
