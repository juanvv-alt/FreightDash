services:
  - type: web
    name: freightdash-web
    env: python
    region: singapore
    plan: standard
    
    buildCommand: >
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput --clear
    
    startCommand: >
      python manage.py migrate &&
      gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 4
    
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DEBUG
        value: "False"
      - key: ENVIRONMENT
        value: "production"
      - key: TZ
        value: "Asia/Singapore"
      - key: ALLOWED_HOSTS
        fromDatabase:
          name: freightdash
          property: hosturl
      - key: DATABASE_URL
        fromDatabase:
          name: freightdash
          property: connectionString

  - type: pserv
    name: freightdash-db
    env: postgres
    plan: standard
    region: singapore
    ipAllowList: []
    postgresMajorVersion: 15
    
    envVars:
      - key: POSTGRES_DB
        value: "freightdash"

databases:
  - name: freightdash
    databaseName: freightdash
    region: singapore
    plan: standard
    postgresVersion: 15
