services:
  - type: web
    name: freightdash-web
    env: docker
    region: singapore
    plan: standard
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health/
    
    envVars:
      - key: DEBUG
        value: "False"
      - key: ENVIRONMENT
        value: "production"
      - key: TZ
        value: "Asia/Singapore"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: freightdash
          property: connectionString
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://freightdash-web.onrender.com,https://freightdash.onrender.com"
      - key: ALLOWED_HOSTS
        value: "freightdash-web.onrender.com,freightdash.onrender.com"

  # AIS ingestion cron: polls aisstream.io for 18 of every 20 minutes.
  # Geofence transitions are detected on the next position inside/outside a
  # fence, so port calls are delayed (not lost) during the 2-minute gap.
  # Set AISSTREAM_API_KEY in the Render dashboard (free key from aisstream.io).
  - type: cron
    name: freightdash-ais-poll
    env: docker
    region: singapore
    plan: starter
    dockerfilePath: ./Dockerfile
    schedule: "*/20 * * * *"
    dockerCommand: python manage.py ingest_ais --duration-seconds 1080
    envVars:
      - key: DEBUG
        value: "False"
      - key: ENVIRONMENT
        value: "production"
      - key: TZ
        value: "Asia/Singapore"
      - key: SECRET_KEY
        fromService:
          type: web
          name: freightdash-web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: freightdash
          property: connectionString
      - key: AISSTREAM_API_KEY
        sync: false

  # Daily supply aggregation: builds DailySupplySnapshot + SupplySignal rows.
  # Runs at 00:15 Asia/Singapore (Render cron uses UTC, so 16:15 UTC = 00:15 SGT).
  - type: cron
    name: freightdash-supply-agg
    env: docker
    region: singapore
    plan: starter
    dockerfilePath: ./Dockerfile
    schedule: "15 16 * * *"
    dockerCommand: python manage.py aggregate_supply
    envVars:
      - key: DEBUG
        value: "False"
      - key: ENVIRONMENT
        value: "production"
      - key: TZ
        value: "Asia/Singapore"
      - key: SECRET_KEY
        fromService:
          type: web
          name: freightdash-web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: freightdash
          property: connectionString

databases:
  - name: freightdash
    databaseName: freightdash
    region: singapore
    plan: standard
    postgresVersion: 15
